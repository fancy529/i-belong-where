<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>我属于哪里</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'ZCOOL QingKe HuangYou', 'Press Start 2P', 'Microsoft YaHei', sans-serif;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  #game-container {
    position: relative;
    width: min(100vw, calc(100vh * 1500 / 920));
    height: min(100vh, calc(100vw * 920 / 1500));
  }
  canvas {
    display: block;
    position: relative;
    z-index: 1;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    width: 100%;
    height: 100%;
  }

  /* ── Start Screen ── */
  #start-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, rgba(30,20,40,0.96) 0%, rgba(40,30,50,0.96) 50%, rgba(30,22,35,0.96) 100%);
    padding: 40px;
  }
  #start-overlay.hidden { display: none; }
  #start-overlay .logo-area {
    text-align: center;
    margin-bottom: 18px;
    animation: logoIn 0.8s ease-out;
  }
  @keyframes logoIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }
  #start-overlay .logo-icon {
    font-size: 64px;
    display: block;
    animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  #start-overlay .logo-title {
    font-family: 'ZCOOL QingKe HuangYou', 'Press Start 2P', 'Microsoft YaHei', sans-serif;
    font-size: 44px;
    color: #f5e6d3;
    letter-spacing: 5px;
    text-shadow: 0 0 24px rgba(241,196,15,0.5), 3px 3px 0 #1a1020;
    margin-top: 8px;
  }
  #start-overlay .divider {
    width: 160px;
    height: 3px;
    background: linear-gradient(90deg, transparent, #f1c40f, transparent);
    margin: 20px 0;
  }
  #start-overlay .intro-text {
    font-family: 'ZCOOL QingKe HuangYou', 'Press Start 2P', 'Microsoft YaHei', sans-serif;
    font-size: 18px;
    color: #d5c8b8;
    text-align: center;
    line-height: 2.4;
    margin-bottom: 32px;
  }
  #start-overlay .intro-text .hl { color: #f1c40f; }
  #start-overlay .start-btn {
    font-family: 'ZCOOL QingKe HuangYou', 'Press Start 2P', 'Microsoft YaHei', sans-serif;
    font-size: 26px;
    padding: 18px 50px;
    border: 4px solid #f5e6d3;
    background: rgba(241,196,15,0.08);
    color: #f5e6d3;
    cursor: pointer;
    letter-spacing: 3px;
    transition: all 0.15s;
    animation: btnGlow 2.5s ease-in-out infinite;
  }
  #start-overlay .start-btn:hover {
    background: #f5e6d3;
    color: #2a1a3e;
    box-shadow: 0 0 36px rgba(241,196,15,0.6);
  }
  @keyframes btnGlow {
    0%, 100% { box-shadow: 0 0 6px rgba(241,196,15,0.2); }
    50% { box-shadow: 0 0 26px rgba(241,196,15,0.5); }
  }
  #start-overlay .floor-deco {
    margin-top: 36px;
    display: flex;
    gap: 18px;
    opacity: 0.45;
  }
  #start-overlay .floor-deco span {
    font-size: 30px;
    animation: floatUp 3.5s ease-in-out infinite;
  }
  #start-overlay .floor-deco span:nth-child(2) { animation-delay: 0.5s; }
  #start-overlay .floor-deco span:nth-child(3) { animation-delay: 1.0s; }
  #start-overlay .floor-deco span:nth-child(4) { animation-delay: 1.5s; }
  #start-overlay .floor-deco span:nth-child(5) { animation-delay: 2.0s; }
  @keyframes floatUp {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-12px) scale(1.08); }
  }

  /* ── Win Overlay ── */
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    font-size: 32px;
    line-height: 2.4;
    text-align: center;
    max-width: 900px;
    opacity: 0;
    transition: opacity 0.8s;
  }

  #overlay .btns {

    gap: 28px;
    flex-wrap: wrap;
    justify-content: center;

  #overlay button {

    font-size: 22px;
    padding: 16px 34px;
    border: 4px solid #f0e6d3;
    background: transparent;
    color: #f0e6d3;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.1s;
  }
  #overlay button:hover {
    background: #f0e6d3;
    color: #1a1a2e;
  }
  #overlay .easter-text {
    color: #f1c40f;
    font-family: 'ZCOOL QingKe HuangYou', 'Press Start 2P', 'Microsoft YaHei', sans-serif;
    font-size: 26px;
    line-height: 2.4;
    text-align: center;
    margin-top: 28px;
    opacity: 0;
    transition: opacity 0.8s;
    max-width: 900px;
  }
  #overlay .easter-text.show { opacity: 1; }
  #overlay .qrcode-area {
    margin-top: 32px;
    opacity: 0;
    transition: opacity 0.8s;
    text-align: center;
  }
  #overlay .qrcode-area.show { opacity: 1; }
  #overlay .qrcode-area img {
    width: 220px;
    height: 220px;
    border: 4px solid #f0e6d3;
    image-rendering: pixelated;
    background: #fff;
    padding: 10px;
  }
  #overlay .qrcode-area p {
    color: #aaa;
    font-family: 'ZCOOL QingKe HuangYou', 'Press Start 2P', 'Microsoft YaHei', sans-serif;
    font-size: 18px;
    margin-top: 14px;
  }

  @media (max-width: 800px) {
    #start-overlay .logo-icon { font-size: 36px; }
    #start-overlay .logo-title { font-size: 22px; letter-spacing: 2px; }
    #start-overlay .intro-text { font-size: 12px; line-height: 2.0; }
    #start-overlay .start-btn { font-size: 18px; padding: 14px 32px; }
    #start-overlay .divider { width: 100px; margin: 12px 0; }
    #start-overlay .floor-deco span { font-size: 20px; }

    #overlay button { font-size: 14px; padding: 12px 22px; }

</head>

<div id="game-container">
  <canvas id="game"></canvas>

  <div id="start-overlay">
    <div class="logo-area">
      <span class="logo-icon">🏠</span>
      <div class="logo-title">我属于哪里</div>
    </div>
    <div class="divider"></div>
    <div class="intro-text">
      家里的<span class="hl">30件</span>物品被打乱了<br>
      散落在<span class="hl">6个</span>不同的房间里<br><br>
      <span class="hl">点击</span>物品 → 拾起<br>

    <button class="start-btn" id="btn-start">开 始 游 戏</button>
    <div class="floor-deco">
      <span>🛁</span><span>🛏️</span><span>🍳</span><span>📚</span><span>🛋️</span>
    </div>
  </div>

  <div id="overlay">
    <div class="message" id="win-message"></div>
    <div class="btns">

      <button id="btn-replay">再来一次</button>

    <div class="qrcode-area" id="qrcode-area">

      <p>喜欢这个游戏？请我喝杯咖啡吧 ☕</p>
    </div>
  </div>

  // ─────────────────── AUDIO ───────────────────
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  function beep(freq, duration, type='square', vol=0.10) {
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + duration);
  }
  function sfxPickup() { beep(600, 0.08, 'square', 0.08); }
  function sfxCorrect() { beep(800, 0.1, 'square', 0.09); setTimeout(() => beep(1200, 0.1, 'square', 0.09), 80); }
  function sfxWrong() { beep(180, 0.10, 'square', 0.07); setTimeout(() => beep(100, 0.18, 'square', 0.07), 110); }
  function sfxWin() {
    [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.2, 'square', 0.09), i * 120));
  }

  // ─────────────────── BACKGROUND MUSIC ───────────────────
  let musicOn = true;
  let musicNodes = null;

  function startMusic() {
    if (!audioCtx) initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (musicNodes) return;

    const actx = audioCtx;
    const masterGain = actx.createGain();
    masterGain.gain.setValueAtTime(0.12, actx.currentTime);
    masterGain.connect(actx.destination);

    const chords = [
      [261.6, 329.6, 392.0],
      [293.7, 369.9, 440.0],
      [349.2, 440.0, 523.3],
      [329.6, 392.0, 493.9],
      [261.6, 329.6, 392.0],
      [392.0, 493.9, 587.3],
      [349.2, 440.0, 523.3],
      [329.6, 392.0, 493.9],
    ];

    const noteDuration = 2.4;

    function playChord(index) {
      if (!musicOn) { musicNodes = null; return; }
      const chord = chords[index % chords.length];
      const now = actx.currentTime;

      chord.forEach((freq, i) => {
        const osc = actx.createOscillator();
        const noteGain = actx.createGain();
        osc.type = i === 0 ? 'triangle' : 'sine';
        osc.frequency.setValueAtTime(freq, now);
        noteGain.gain.setValueAtTime(0, now);
        noteGain.gain.linearRampToValueAtTime(0.07, now + 0.4);
        noteGain.gain.setValueAtTime(0.07, now + noteDuration - 0.4);
        noteGain.gain.linearRampToValueAtTime(0, now + noteDuration);
        osc.connect(noteGain);
        noteGain.connect(masterGain);
        osc.start(now);
        osc.stop(now + noteDuration);
      });

      musicNodes = setTimeout(() => playChord(index + 1), (noteDuration - 0.05) * 1000);
    }

    playChord(0);
  }

  function stopMusic() {
    musicOn = false;
    if (musicNodes) { clearTimeout(musicNodes); musicNodes = null; }

    c.width = c.height = SPRITE_BASE;
    const cx = c.getContext('2d');
    cx.imageSmoothingEnabled = false;
    for (const s of shapes) {
      cx.fillStyle = s.c;
      cx.fillRect(s.x, s.y, s.w, s.h);
    }
    return c;
  }

  function initGame() {
    gameComplete = false;
    easterRevealed = false;
    winLinesShown = 0;
    feedbacks = [];

    hoveredItem = null;
    currentRoom = 'kitchen';
    overlay.classList.remove('active');
    winMsg.classList.remove('show');
    winMsg.innerHTML = '';
    easterTxt.classList.remove('show');
    easterTxt.innerHTML = '';

    btnEaster.style.display = 'inline-block';
    btnEaster.textContent = '...';
    if (winAnimTimer) { clearTimeout(winAnimTimer); winAnimTimer = null; }
    consecutiveWrongs = 0;
    showHint = false;

    items = ITEM_DEFS.map(def => ({
      ...def,
      sprite: sprites[def.id],
      currentRoom: null,
      x: 0, y: 0,
    }));
    items.forEach(it => {
      const otherRooms = ROOM_KEYS.filter(r => r !== it.home);
      it.currentRoom = otherRooms[Math.floor(Math.random() * otherRooms.length)];
    });
    ROOM_KEYS.forEach(rk => positionItemsInRoom(rk));
  }

  function positionItemsInRoom(roomKey) {
    const roomItems = items.filter(it => it.currentRoom === roomKey && it !== heldItem);
    if (roomItems.length === 0) return;
    const padding = 50;
    const itemW = SPRITE_S + 70;
    const itemH = SPRITE_S + 64;
    const cols = Math.min(roomItems.length, Math.max(1, Math.floor((ROOM_W - padding * 2 - WALL * 2) / itemW)));
    const rows = Math.ceil(roomItems.length / cols);
    const cellW = (ROOM_W - padding * 2 - WALL * 2) / cols;
    const cellH = (ROOM_H - padding * 2 - WALL * 2) / Math.max(rows, 1);
    const roomLeft = ROOM_X + WALL + padding;
    const roomTop = ROOM_Y + WALL + padding;

    roomItems.forEach((it, idx) => {
      const c = idx % cols;
      const r = Math.floor(idx / cols);
      it.x = roomLeft + c * cellW + (cellW - SPRITE_S) / 2 + (Math.random() - 0.5) * 16;
      it.y = roomTop + r * cellH + (cellH - SPRITE_S) / 2 + (Math.random() - 0.5) * 10;
    });
  }

  function correctCount() {
    return items.filter(it => it.currentRoom === it.home).length;
  }

  function isInCorrectZone(item) {
    const zones = ROOM_ZONES[item.home];
    const itemZones = item.zones;
    if (!itemZones || !zones || itemZones.length === 0) return true;
    // Convert item center to original room coords
    const cx = (item.x + SPRITE_S/2 - ROOM_X - WALL) / FURN_SCALE_X;
    const cy = (item.y + SPRITE_S/2 - ROOM_Y - WALL) / FURN_SCALE_Y;
    return itemZones.some(zname => {
      const z = zones[zname];
      if (!z) return false;
      // Allow some margin around zone
      const margin = 15;
      return cx >= z.x - margin && cx <= z.x + z.w + margin &&
             cy >= z.y - margin && cy <= z.y + z.h + margin;
    });
  }

  // ─────────────────── RENDERING ───────────────────
  function drawTabBar() {
    const tabW = Math.floor((W - 20) / 6);
    const tabH = UI_H - 8;
    const tabY = 4;

    ROOM_KEYS.forEach((rk, i) => {
      const tx = 10 + i * tabW;
      const isActive = rk === currentRoom;
      const info = ROOM_INFO[rk];

      ctx.fillStyle = isActive ? '#3d3050' : '#1a1a2e';
      ctx.fillRect(tx, tabY, tabW - 2, tabH);

      ctx.strokeStyle = isActive ? '#f0e6d3' : '#555';
      ctx.lineWidth = isActive ? 4 : 3;
      ctx.strokeRect(tx + 1, tabY + 1, tabW - 4, tabH - 2);

      if (heldItem && tabPulse % 40 < 20) {
        ctx.strokeStyle = '#f1c40f';
        ctx.lineWidth = 3;
        ctx.strokeRect(tx - 2, tabY - 2, tabW, tabH + 4);
      }

      // Hint: pulse the item's home room tab in bright cyan
      if (showHint && heldItem && rk === heldItem.home && tabPulse % 30 < 15) {
        ctx.strokeStyle = '#00e5ff';
        ctx.lineWidth = 5;
        ctx.strokeRect(tx - 3, tabY - 3, tabW + 2, tabH + 8);
      }

      ctx.fillStyle = isActive ? '#f0e6d3' : '#999';
      ctx.font = `bold 48px ${FONT}`;
      ctx.textAlign = 'center';
      ctx.fillText(info.name, tx + (tabW - 2) / 2, tabY + 48);
      ctx.textAlign = 'start';

      const count = items.filter(it => it.currentRoom === rk).length;
      ctx.fillStyle = isActive ? '#a090b0' : '#666';
      ctx.font = `26px ${FONT}`;
      ctx.textAlign = 'center';
      ctx.fillText(count + '件', tx + (tabW - 2) / 2, tabY + 82);
      ctx.textAlign = 'start';
    });
  }

  function drawRoomScene() {
    const info = ROOM_INFO[currentRoom];
    const ix = ROOM_X, iy = ROOM_Y, iw = ROOM_W, ih = ROOM_H;
    const inX = ix + WALL, inY = iy + WALL, inW = iw - WALL*2, inH = ih - WALL*2;

    // Floor
    ctx.fillStyle = info.floor;
    ctx.fillRect(ix, iy, iw, ih);

    // Floor pattern - varies by room
    ctx.fillStyle = info.floorGrid;
    if (currentRoom === 'bathroom') {
      for (let gx = inX; gx < inX + inW; gx += 24) {
        for (let gy = inY; gy < inY + inH; gy += 24) {
          if ((Math.floor((gx-inX)/24) + Math.floor((gy-inY)/24)) % 2 === 0) {
            ctx.fillRect(gx, gy, 22, 22);
          }
        }
      }
    } else if (currentRoom === 'kitchen') {
      for (let gx = inX; gx < inX + inW; gx += 44) {
        for (let gy = inY; gy < inY + inH; gy += 44) {
          ctx.fillRect(gx + 1, gy + 1, 40, 40);
        }
      }
    } else {
      for (let gx = ix; gx < ix + iw; gx += 36) {
        for (let gy = iy; gy < iy + ih; gy += 36) {
          ctx.fillRect(gx, gy, 5, 5);
        }
      }
    }

    // Furniture
    const scene = ROOM_SCENES[currentRoom] || [];
    ctx.save();
    ctx.translate(inX, inY);
    ctx.scale(FURN_SCALE_X, FURN_SCALE_Y);
    scene.forEach(s => {
      ctx.fillStyle = s.c;
      ctx.fillRect(s.x, s.y, s.w, s.h);
      ctx.fillStyle = 'rgba(0,0,0,0.07)';
      ctx.fillRect(s.x + 1, s.y + 1, s.w, s.h);
      ctx.fillStyle = s.c;
      ctx.fillRect(s.x, s.y, s.w, s.h);
    });
    ctx.restore();

    // Baseboard
    ctx.fillStyle = '#3a2818';
    ctx.fillRect(inX, inY + inH - 14, inW, 14);
    ctx.fillStyle = '#4a3828';
    ctx.fillRect(inX, inY + inH - 14, inW, 3);

    // Walls
    ctx.fillStyle = '#4a3728';
    ctx.fillRect(ix, iy, iw, WALL);
    ctx.fillRect(ix, iy + ih - WALL, iw, WALL);
    ctx.fillRect(ix, iy, WALL, ih);
    ctx.fillRect(ix + iw - WALL, iy, WALL, ih);
    ctx.fillStyle = '#5d4a37';
    ctx.fillRect(ix, iy, WALL, WALL);
    ctx.fillRect(ix + iw - WALL, iy, WALL, WALL);

    // Room watermark
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.font = `bold 56px ${FONT}`;
    ctx.textAlign = 'right';
    ctx.fillText(info.name, ix + iw - WALL - 60, iy + ih - WALL - 24);
    ctx.textAlign = 'start';
  }

  function drawItem(it, x, y, alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;

    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(x + 4, y + SPRITE_S, SPRITE_S, 5);

    ctx.drawImage(it.sprite, x, y, SPRITE_S, SPRITE_S);

    ctx.fillStyle = '#333';
    ctx.font = `38px ${FONT}`;
    ctx.textAlign = 'center';
    ctx.fillText(it.name, x + SPRITE_S / 2, y + SPRITE_S + 40);
    ctx.textAlign = 'start';

    ctx.restore();
  }

  function render() {
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);

    drawRoomScene();

    items.forEach(it => {
      if (it.currentRoom !== currentRoom || it === heldItem) return;
      const isHov = it === hoveredItem;
      if (isHov) {
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.fillRect(it.x - 6, it.y - 6, SPRITE_S + 12, SPRITE_S + 48);
      }
      drawItem(it, it.x, it.y);
    });

    feedbacks = feedbacks.filter(f => f.timer > 0);
    if (feedbacks.length > 0 && feedbacks[0].room === currentRoom) {
      feedbacks.forEach(f => {
        ctx.fillStyle = f.color;
        ctx.globalAlpha = Math.min(0.35, f.timer / 30);
        ctx.fillRect(ROOM_X + WALL, ROOM_Y + WALL, ROOM_W - WALL * 2, ROOM_H - WALL * 2);
        ctx.globalAlpha = 1;
        f.timer--;
      });
    }

    if (heldItem) {
      const hx = mouseX - SPRITE_S / 2;
      const hy = mouseY - SPRITE_S / 2 - 14;
      ctx.fillStyle = 'rgba(255,255,200,0.2)';
      ctx.fillRect(hx - 10, hy - 10, SPRITE_S + 20, SPRITE_S + 50);
      drawItem(heldItem, hx, hy, 0.9);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 3;
      ctx.strokeRect(hx - 4, hy - 4, SPRITE_S + 8, SPRITE_S + 8);

      ctx.fillStyle = '#f1c40f';
      ctx.font = `34px ${FONT}`;
      ctx.textAlign = 'center';
      ctx.fillText('手持: ' + heldItem.name, mouseX, hy - 18);
      ctx.textAlign = 'start';

      if (showHint && heldItem) {
        const ZN = { bed:'床上',bedside:'床边地上',nightstand:'床头柜',wardrobe:'衣柜',dresser:'梳妆台',sink:'洗手池',toilet:'马桶旁',tub:'浴缸',rod:'挂衣杆',shoes:'鞋架',drawer:'抽屉',counter:'台面',stove:'灶台',table:'餐桌',fridge:'冰箱',sofa:'沙发',tv:'电视旁',corner:'角落',bookshelf:'书架',desk:'书桌',chair:'椅子',armchair:'扶手椅' };
        const z = (heldItem.zones||[])[0];
        const hint = z && ZN[z] ? ROOM_INFO[heldItem.home].name + ' · ' + ZN[z] : ROOM_INFO[heldItem.home].name;
        ctx.fillStyle = '#00e5ff';
        ctx.font = `28px ${FONT}`;
        ctx.textAlign = 'center';
        ctx.fillText('💡 ' + hint, mouseX, hy - 52);
        ctx.textAlign = 'start';
      }
    }

    drawTabBar();

    ctx.fillStyle = '#2c2c44';
    ctx.fillRect(0, UI_H, W, 3);

    // Progress bar (bottom)
    const correct = correctCount();
    const total = items.length;
    const barX = 20, barY = H - 48, barW = 380, barH = 26;
    ctx.fillStyle = '#111';
    ctx.fillRect(barX - 3, barY - 3, barW + 6, barH + 6);
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 3;
    ctx.strokeRect(barX - 3, barY - 3, barW + 6, barH + 6);
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(barX, barY, barW, barH);
    const pw = Math.floor((correct / total) * barW);
    if (pw > 0) {
      const grad = ctx.createLinearGradient(barX, barY, barX + barW, barY);
      grad.addColorStop(0, '#27ae60');
      grad.addColorStop(1, correct === total ? '#2ecc71' : '#f1c40f');
      ctx.fillStyle = grad;
      ctx.fillRect(barX, barY, pw, barH);
    }
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    const segW = Math.floor(barW / total);
    for (let sx = barX + segW; sx < barX + barW; sx += segW) {
      ctx.fillRect(sx, barY, 3, barH);
    }

    // Title above progress bar
    ctx.fillStyle = '#ffffff';
    ctx.font = `bold 40px ${FONT}`;
    ctx.textAlign = 'left';
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 6;
    ctx.fillText('🏠 我属于哪里', barX, barY - 56);
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.textAlign = 'start';

    // Progress text
    ctx.fillStyle = '#fff';
    ctx.font = `bold 32px ${FONT}`;
    ctx.fillText(`已归位 ${correct} / ${total}`, barX, barY - 14);

    // Music toggle
    const musicBtnSize = 38;
    const musicX = W - musicBtnSize - 18, musicY = H - musicBtnSize - 12;
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(musicX - 3, musicY - 3, musicBtnSize, musicBtnSize);
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 3;
    ctx.strokeRect(musicX - 3, musicY - 3, musicBtnSize, musicBtnSize);
    ctx.fillStyle = musicOn ? '#f1c40f' : '#666';
    ctx.font = '26px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(musicOn ? '♫' : '♪', musicX + musicBtnSize/2, musicY + musicBtnSize/2 + 9);
    ctx.textAlign = 'start';

    const needLoop = heldItem || feedbacks.length > 0 || tabPulse > 0;
    if (needLoop) {
      tabPulse = (tabPulse + 1) % 80;
      requestAnimationFrame(render);
    }
  }

  // ─────────────────── INPUT ───────────────────
  function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    let cx, cy;
    if (e.changedTouches && e.changedTouches.length > 0) {
      cx = e.changedTouches[0].clientX; cy = e.changedTouches[0].clientY;
    } else if (e.touches && e.touches.length > 0) {
      cx = e.touches[0].clientX; cy = e.touches[0].clientY;
    } else {
      cx = e.clientX; cy = e.clientY;
    }
    return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
  }

  function findTabAt(cx, cy) {
    if (cy < 4 || cy > UI_H - 4) return null;
    const tabW = Math.floor((W - 20) / 6);
    const idx = Math.floor((cx - 10) / tabW);
    if (idx >= 0 && idx < 6 && cx >= 10 + idx * tabW && cx < 10 + (idx + 1) * tabW) {
      return ROOM_KEYS[idx];
    }
    return null;
  }

  function findItemInRoom(cx, cy) {
    for (let i = items.length - 1; i >= 0; i--) {
      const it = items[i];
      if (it.currentRoom !== currentRoom || it === heldItem) continue;
      if (cx >= it.x && cx <= it.x + SPRITE_S && cy >= it.y && cy <= it.y + SPRITE_S + 44) {
        return it;
      }
    }
    return null;
  }

  function isInRoom(cx, cy) {
    return cx >= ROOM_X && cx <= ROOM_X + ROOM_W && cy >= ROOM_Y && cy <= ROOM_Y + ROOM_H;
  }

  function onDown(e) {
    if (!gameStarted || gameComplete) return;
    initAudio();
    startMusic();
    e.preventDefault();
    const pos = getCanvasPos(e);
    mouseX = pos.x; mouseY = pos.y;

    const musicBtnSize = 38;
    const musicX = W - musicBtnSize - 18, musicY = H - musicBtnSize - 12;
    if (pos.x > musicX - 3 && pos.x < musicX + musicBtnSize - 3 && pos.y > musicY - 3 && pos.y < musicY + musicBtnSize - 3) {
      musicOn = !musicOn;
      if (musicOn) { musicNodes = null; startMusic(); } else { stopMusic(); }
      requestAnimationFrame(render);
      return;
    }

    const tabKey = findTabAt(pos.x, pos.y);
    if (tabKey !== null) {
      if (heldItem) {
        currentRoom = tabKey;
        sfxPickup();
        requestAnimationFrame(render);
        return;
      }
      currentRoom = tabKey;
      hoveredItem = null;
      requestAnimationFrame(render);
      return;
    }

    if (!isInRoom(pos.x, pos.y)) return;

    if (heldItem) {
      heldItem.currentRoom = currentRoom;
      heldItem.x = pos.x - SPRITE_S / 2;
      heldItem.y = pos.y - SPRITE_S / 2 - 14;

      const minX = ROOM_X + WALL + 4;
      const minY = ROOM_Y + WALL + 4;
      const maxX = ROOM_X + ROOM_W - WALL - SPRITE_S - 4;
      const maxY = ROOM_Y + ROOM_H - WALL - SPRITE_S - 44;
      heldItem.x = Math.max(minX, Math.min(maxX, heldItem.x));
      heldItem.y = Math.max(minY, Math.min(maxY, heldItem.y));

      if (currentRoom !== heldItem.home) {
        // Wrong room
        consecutiveWrongs++;
        if (consecutiveWrongs >= 3) showHint = true;
        feedbacks.push({ room: currentRoom, color: '#e74c3c', timer: 15 });
        sfxWrong();
      } else if (!isInCorrectZone(heldItem)) {
        // Right room, wrong spot
        consecutiveWrongs++;
        if (consecutiveWrongs >= 3) showHint = true;
        feedbacks.push({ room: currentRoom, color: '#f39c12', timer: 20 });
        sfxWrong();
      } else {
        // Perfect placement
        consecutiveWrongs = 0;
        showHint = false;
        feedbacks.push({ room: currentRoom, color: '#2ecc71', timer: 25 });
        sfxCorrect();
      }
      heldItem = null;
      checkWin();
      requestAnimationFrame(render);
      return;
    }

    const item = findItemInRoom(pos.x, pos.y);
    if (item) {
      heldItem = item;
      heldOrigRoom = item.currentRoom;
      heldOrigX = item.x;
      heldOrigY = item.y;
      sfxPickup();
      requestAnimationFrame(render);
    }
  }

  function onMove(e) {
    e.preventDefault();
    const pos = getCanvasPos(e);
    mouseX = pos.x; mouseY = pos.y;

    if (heldItem) {
      requestAnimationFrame(render);
    } else if (!gameComplete && isInRoom(pos.x, pos.y)) {
      const item = findItemInRoom(pos.x, pos.y);
      if (item !== hoveredItem) {
        hoveredItem = item;
        requestAnimationFrame(render);
      }
    }
  }

  function onUp(e) {}

  function onContextMenu(e) {
    if (heldItem) {
      e.preventDefault();
      heldItem.x = heldOrigX;
      heldItem.y = heldOrigY;
      heldItem.currentRoom = heldOrigRoom;
      heldItem = null;
      requestAnimationFrame(render);
    }
  }

  function onKeyDown(e) {
    if (e.key === 'Escape' && heldItem) {
      heldItem.x = heldOrigX;
      heldItem.y = heldOrigY;
      heldItem.currentRoom = heldOrigRoom;
      heldItem = null;
      requestAnimationFrame(render);
    }
  }

  function checkWin() {
    const allCorrect = items.every(it => it.currentRoom === it.home);
    if (allCorrect) {
      gameComplete = true;
      sfxWin();
      setTimeout(showWinScreen, 500);
    }
  }

  // ─────────────────── START SCREEN ───────────────────
  // 捕获阶段：确保任何点击都先初始化音频
  startOverlay.addEventListener('click', () => {
    initAudio();
    startMusic();
  }, true);

  function sfxStart() { beep(400, 0.1, 'square', 0.07); setTimeout(() => beep(600, 0.1, 'square', 0.07), 80); setTimeout(() => beep(900, 0.15, 'square', 0.08), 160); }

  btnStart.addEventListener('click', () => {
    sfxStart();
    gameStarted = true;
    startOverlay.classList.add('hidden');
    initGame();
    requestAnimationFrame(render);
  });

  // ─────────────────── WIN SCREEN ───────────────────
  const WIN_LINES = [
    '所有物品都回到了',
    '"该在"的位置。',
    '',
    '但它们并没有',
    '改变自己。',
    '',
    '你也是。',
    '不必扭曲自己去融入',
    '某个地方。',
    '',
    '吾心安处即是家。',
  ];

  const EASTER_LINES = [
    '其实，谁规定',
    '马桶上不能吃饭呢？',
    '',
    '这是你的家，',
    '你说了算。',
    '',
    '所谓的"归属"，',
    '不过是一道选择题。',
    '',
    '你不属于任何地方，',
    '所以你属于所有地方。',
  ];

  function showWinScreen() {
    overlay.classList.add('active');
    btnEaster.style.display = 'inline-block';
    btnReplay.style.display = 'inline-block';
    btnEaster.textContent = '...';
    easterTxt.classList.remove('show');
    easterTxt.innerHTML = '';
    qrcodeArea.classList.remove('show');
    easterRevealed = false;

    winMsg.innerHTML = '';
    winMsg.classList.add('show');
    winLinesShown = 0;

    function showNextLine() {
      if (winLinesShown < WIN_LINES.length) {
        const line = WIN_LINES[winLinesShown];
        const span = document.createElement('span');
        span.className = 'line';
        span.textContent = line || ' ';
        winMsg.appendChild(span);
        winLinesShown++;
        winAnimTimer = setTimeout(showNextLine, line ? 500 : 300);
      }
    }
    winAnimTimer = setTimeout(showNextLine, 400);
  }

  btnEaster.addEventListener('click', () => {
    if (!gameComplete) return;
    if (!easterRevealed) {
      easterTxt.innerHTML = EASTER_LINES.map(l => `<span class="line">${l || '&nbsp;'}</span>`).join('');
      easterTxt.classList.add('show');
      qrcodeArea.classList.add('show');
      btnEaster.textContent = '打乱一切';
      easterRevealed = true;
    } else {
      const allRooms = ROOM_KEYS;
      items.forEach(it => {
        it.currentRoom = allRooms[Math.floor(Math.random() * allRooms.length)];
      });
      ROOM_KEYS.forEach(rk => positionItemsInRoom(rk));
      gameComplete = false;
      easterRevealed = false;
      winLinesShown = 0;
      feedbacks = [];
      heldItem = null;
      hoveredItem = null;
      consecutiveWrongs = 0;
      showHint = false;
      currentRoom = 'kitchen';
      overlay.classList.remove('active');
      winMsg.classList.remove('show');
      winMsg.innerHTML = '';
      easterTxt.classList.remove('show');
      easterTxt.innerHTML = '';
      qrcodeArea.classList.remove('show');
      btnEaster.textContent = '...';
      if (winAnimTimer) { clearTimeout(winAnimTimer); winAnimTimer = null; }
      requestAnimationFrame(render);
      sfxPickup();
    }
  });

  btnReplay.addEventListener('click', () => {
    initGame();
    requestAnimationFrame(render);
  });

  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup', onUp);
  canvas.addEventListener('contextmenu', onContextMenu);
  canvas.addEventListener('touchstart', onDown, { passive: false });
  canvas.addEventListener('touchmove', onMove, { passive: false });
  canvas.addEventListener('touchend', onUp);
  window.addEventListener('keydown', onKeyDown);

  qrcodeImg.src = 'qrcode.jpg';

  items = ITEM_DEFS.map(def => ({
    ...def,
    sprite: sprites[def.id],
    currentRoom: null,
    x: 0, y: 0,
  }));
  items.forEach(it => {
    const otherRooms = ROOM_KEYS.filter(r => r !== it.home);
    it.currentRoom = otherRooms[Math.floor(Math.random() * otherRooms.length)];
  });
  ROOM_KEYS.forEach(rk => positionItemsInRoom(rk));
  requestAnimationFrame(render);
  console.log('🏠 归属 - Belonging');
})();
</script>
</body>
