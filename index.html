<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>我属于哪里</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Press Start 2P', 'Microsoft YaHei', sans-serif;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  #game-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    max-width: 1200px;
    max-height: 800px;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    width: 100%;
    height: 100%;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.88);
    z-index: 10;
    padding: 20px;
    overflow-y: auto;
  }
  #overlay.active { display: flex; }
  #overlay .message {
    color: #f0e6d3;
    font-family: 'Press Start 2P', 'Microsoft YaHei', sans-serif;
    font-size: 12px;
    line-height: 2.4;
    text-align: center;
    max-width: 700px;
    opacity: 0;
    transition: opacity 0.8s;
  }
  #overlay .message.show { opacity: 1; }
  #overlay .message .line { display: block; margin: 6px 0; }
  #overlay .btns {
    margin-top: 28px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  #overlay button {
    font-family: 'Press Start 2P', 'Microsoft YaHei', sans-serif;
    font-size: 10px;
    padding: 12px 24px;
    border: 3px solid #f0e6d3;
    background: transparent;
    color: #f0e6d3;
    cursor: pointer;
    image-rendering: pixelated;
    transition: all 0.1s;
    letter-spacing: 1px;
  }
  #overlay button:hover {
    background: #f0e6d3;
    color: #1a1a2e;
  }
  #overlay .easter-text {
    color: #f1c40f;
    font-family: 'Press Start 2P', 'Microsoft YaHei', sans-serif;
    font-size: 10px;
    line-height: 2.4;
    text-align: center;
    margin-top: 20px;
    opacity: 0;
    transition: opacity 0.8s;
    max-width: 700px;
  }
  #overlay .easter-text.show { opacity: 1; }
  #overlay .qrcode-area {
    margin-top: 24px;
    opacity: 0;
    transition: opacity 0.8s;
    text-align: center;
  }
  #overlay .qrcode-area.show { opacity: 1; }
  #overlay .qrcode-area img {
    width: 180px;
    height: 180px;
    border: 4px solid #f0e6d3;
    image-rendering: pixelated;
    background: #fff;
    padding: 8px;
  }
  #overlay .qrcode-area p {
    color: #aaa;
    font-family: 'Press Start 2P', 'Microsoft YaHei', sans-serif;
    font-size: 8px;
    margin-top: 10px;
  }
  @media (max-width: 600px) {
    #overlay .message { font-size: 8px; line-height: 2.2; }
    #overlay button { font-size: 7px; padding: 10px 16px; }
    #overlay .easter-text { font-size: 7px; }
    #overlay .qrcode-area img { width: 140px; height: 140px; }
    #overlay .qrcode-area p { font-size: 6px; }
  }

  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  function beep(freq, duration, type='square', vol=0.08) {
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + duration);
  }
  function sfxPickup() { beep(600, 0.08, 'square', 0.05); }
  function sfxCorrect() { beep(800, 0.1, 'square', 0.06); setTimeout(() => beep(1200, 0.1, 'square', 0.06), 80); }
  function sfxWrong() { beep(150, 0.15, 'triangle', 0.05); }
  function sfxWin() {
    [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.2, 'square', 0.06), i * 120));
  }

  // ─────────────────── BACKGROUND MUSIC ───────────────────
  let musicOn = true;
  let musicNodes = null;

  function startMusic() {
    if (!audioCtx) initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (musicNodes) return; // already playing

    const ctx = audioCtx;
    const masterGain = ctx.createGain();
    masterGain.gain.setValueAtTime(0.08, ctx.currentTime);
    masterGain.connect(ctx.destination);

    // Warm chord progression notes (low, gentle)
    const chords = [
      [261.6, 329.6, 392.0], // C major
      [293.7, 369.9, 440.0], // D minor
      [349.2, 440.0, 523.3], // F major
      [329.6, 392.0, 493.9], // E minor
      [261.6, 329.6, 392.0], // C major
      [392.0, 493.9, 587.3], // G major
      [349.2, 440.0, 523.3], // F major
      [329.6, 392.0, 493.9], // E minor
    ];

    const noteDuration = 2.4; // seconds per chord

    function playChord(index) {
      if (!musicOn) { musicNodes = null; return; }
      const chord = chords[index % chords.length];
      const now = ctx.currentTime;

      chord.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const noteGain = ctx.createGain();
        osc.type = i === 0 ? 'triangle' : 'sine';
        osc.frequency.setValueAtTime(freq, now);
        noteGain.gain.setValueAtTime(0, now);
        noteGain.gain.linearRampToValueAtTime(0.05, now + 0.4);
        noteGain.gain.setValueAtTime(0.05, now + noteDuration - 0.4);
        noteGain.gain.linearRampToValueAtTime(0, now + noteDuration);
        osc.connect(noteGain);
        noteGain.connect(masterGain);
        osc.start(now);
        osc.stop(now + noteDuration);
      });

      // Schedule next chord
      musicNodes = setTimeout(() => playChord(index + 1), (noteDuration - 0.05) * 1000);
    }

    playChord(0);
  }

  function stopMusic() {
    musicOn = false;
    if (musicNodes) { clearTimeout(musicNodes); musicNodes = null; }

  // ─────────────────── SPRITE BUILDER ───────────────────
  function buildSprite(shapes) {
    const c = document.createElement('canvas');
    c.width = c.height = SPRITE_BASE;
    const cx = c.getContext('2d');
    cx.imageSmoothingEnabled = false;
    for (const s of shapes) {
      cx.fillStyle = s.c;
      cx.fillRect(s.x, s.y, s.w, s.h);
    }
    return c;
  }

  // ─────────────────── ITEMS DATA ───────────────────
  const ITEM_DEFS = [

  // ─────────────────── GAME STATE ───────────────────
  let items = [];
  let currentRoom = 'kitchen'; // starting room
  let heldItem = null;        // item currently being carried
  let heldOrigRoom = null;    // room item was picked up from
  let heldOrigX = 0, heldOrigY = 0; // original position before pickup
  let mouseX = 0, mouseY = 0;
  let hoveredItem = null;
  let feedbacks = [];
  let gameComplete = false;
  let easterRevealed = false;
  let winLinesShown = 0;
  let winAnimTimer = null;
  let tabPulse = 0;

  function initGame() {
    gameComplete = false;
    easterRevealed = false;
    winLinesShown = 0;
    feedbacks = [];
    heldItem = null;
    hoveredItem = null;
    currentRoom = 'kitchen';
    overlay.classList.remove('active');
    winMsg.classList.remove('show');
    winMsg.innerHTML = '';
    easterTxt.classList.remove('show');
    easterTxt.innerHTML = '';
    qrcodeArea.classList.remove('show');
    btnEaster.style.display = 'inline-block';
    btnEaster.textContent = '...';
    if (winAnimTimer) { clearTimeout(winAnimTimer); winAnimTimer = null; }

    // Assign each item to a random NON-home room
    items = ITEM_DEFS.map(def => ({
      ...def,
      sprite: sprites[def.id],
      currentRoom: null,
      x: 0, y: 0,
    }));
    items.forEach(it => {
      const otherRooms = ROOM_KEYS.filter(r => r !== it.home);
      it.currentRoom = otherRooms[Math.floor(Math.random() * otherRooms.length)];
    });
    ROOM_KEYS.forEach(rk => positionItemsInRoom(rk));
  }

  function positionItemsInRoom(roomKey) {
    const roomItems = items.filter(it => it.currentRoom === roomKey && it !== heldItem);
    if (roomItems.length === 0) return;
    const padding = 20;
    const itemW = SPRITE_S + 28;
    const itemH = SPRITE_S + 30;
    const cols = Math.max(1, Math.floor((ROOM_W - padding * 2 - WALL * 2) / itemW));
    const cellW = (ROOM_W - padding * 2 - WALL * 2) / cols;
    const roomLeft = ROOM_X + WALL + padding;
    const roomTop = ROOM_Y + WALL + padding;

    roomItems.forEach((it, idx) => {
      const c = idx % cols;
      const r = Math.floor(idx / cols);
      it.x = roomLeft + c * cellW + (cellW - SPRITE_S) / 2 + (Math.random() - 0.5) * 12;
      it.y = roomTop + r * itemH + 10 + (Math.random() - 0.5) * 8;
    });
  }

  function correctCount() {
    return items.filter(it => it.currentRoom === it.home).length;
  }

  // ─────────────────── RENDERING ───────────────────
  function drawTabBar() {
    const tabW = Math.floor((W - 20) / 6);
    const tabH = UI_H - 8;
    const tabY = 4;

    ROOM_KEYS.forEach((rk, i) => {
      const tx = 10 + i * tabW;
      const isActive = rk === currentRoom;
      const info = ROOM_INFO[rk];

      // Tab background
      ctx.fillStyle = isActive ? '#3d3050' : '#1a1a2e';
      ctx.fillRect(tx, tabY, tabW - 2, tabH);

      // Border
      ctx.strokeStyle = isActive ? '#f0e6d3' : '#555';
      ctx.lineWidth = isActive ? 3 : 2;
      ctx.strokeRect(tx + 1, tabY + 1, tabW - 4, tabH - 2);

      // Pulsing border when holding item (any room is a valid target)
      if (heldItem && tabPulse % 40 < 20) {
        ctx.strokeStyle = '#f1c40f';
        ctx.lineWidth = 2;
        ctx.strokeRect(tx - 1, tabY - 1, tabW, tabH + 2);
      }

      // Room name
      ctx.fillStyle = isActive ? '#f0e6d3' : '#999';
      ctx.font = '12px "Press Start 2P", "Microsoft YaHei", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(info.name, tx + (tabW - 2) / 2, tabY + 24);
      ctx.textAlign = 'start';

      // Item count badge
      const count = items.filter(it => it.currentRoom === rk).length;
      ctx.fillStyle = '#555';
      ctx.font = '7px "Press Start 2P", "Microsoft YaHei", sans-serif';
      ctx.fillText(count + '件', tx + (tabW - 2) / 2, tabY + 40);
    });
  }

  function drawRoomScene() {
    const info = ROOM_INFO[currentRoom];
    const ix = ROOM_X, iy = ROOM_Y, iw = ROOM_W, ih = ROOM_H;

    // Floor
    ctx.fillStyle = info.floor;
    ctx.fillRect(ix, iy, iw, ih);

    // Floor grid texture
    ctx.fillStyle = info.floorGrid;
    for (let gx = ix; gx < ix + iw; gx += 24) {
      for (let gy = iy; gy < iy + ih; gy += 24) {
        ctx.fillRect(gx, gy, 2, 2);
      }
    }

    // Draw furniture
    const scene = ROOM_SCENES[currentRoom] || [];
    scene.forEach(s => {
      const sx = ix + WALL + s.x;
      const sy = iy + WALL + s.y;
      ctx.fillStyle = s.c;
      ctx.fillRect(sx, sy, s.w, s.h);
      // Subtle shadow/depth
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.fillRect(sx + 2, sy + 2, s.w, s.h);
      ctx.fillStyle = s.c;
      ctx.fillRect(sx, sy, s.w, s.h);
    });

    // Walls (drawn last so they overlay furniture edges)
    ctx.fillStyle = '#4a3728';
    ctx.fillRect(ix, iy, iw, WALL);               // top
    ctx.fillRect(ix, iy + ih - WALL, iw, WALL);   // bottom
    ctx.fillRect(ix, iy, WALL, ih);               // left
    ctx.fillRect(ix + iw - WALL, iy, WALL, ih);   // right
    // Wall highlights
    ctx.fillStyle = '#5d4a37';
    ctx.fillRect(ix, iy, WALL, WALL);
    ctx.fillRect(ix + iw - WALL, iy, WALL, WALL);

    // Room label (subtle, bottom-right)
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.font = 'bold 24px "Press Start 2P", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(info.name, ix + iw - WALL - 16, iy + ih - WALL - 16);
    ctx.textAlign = 'start';
  }

  function drawItem(it, x, y, alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(x + 2, y + SPRITE_S, SPRITE_S, 3);

    // Sprite
    ctx.drawImage(it.sprite, x, y, SPRITE_S, SPRITE_S);

    // Label
    ctx.fillStyle = '#333';
    ctx.font = '9px "Press Start 2P", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(it.name, x + SPRITE_S / 2, y + SPRITE_S + 14);
    ctx.textAlign = 'start';

    ctx.restore();
  }

  function render() {
    // Clear
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);

    // Draw room scene
    drawRoomScene();

    // Draw items in current room (except held item)
    items.forEach(it => {
      if (it.currentRoom !== currentRoom || it === heldItem) return;
      const isHov = it === hoveredItem;
      if (isHov) {
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.fillRect(it.x - 3, it.y - 3, SPRITE_S + 6, SPRITE_S + 22);
      }
      drawItem(it, it.x, it.y);
    });

    // Feedback flashes
    feedbacks = feedbacks.filter(f => f.timer > 0);
    if (feedbacks.length > 0 && feedbacks[0].room === currentRoom) {
      feedbacks.forEach(f => {
        ctx.fillStyle = f.color;
        ctx.globalAlpha = Math.min(0.35, f.timer / 30);
        ctx.fillRect(ROOM_X + WALL, ROOM_Y + WALL, ROOM_W - WALL * 2, ROOM_H - WALL * 2);
        ctx.globalAlpha = 1;
        f.timer--;
      });
    }

    // Held item (follows cursor)
    if (heldItem) {
      const hx = mouseX - SPRITE_S / 2;
      const hy = mouseY - SPRITE_S / 2 - 10;
      // Glow
      ctx.fillStyle = 'rgba(255,255,200,0.2)';
      ctx.fillRect(hx - 6, hy - 6, SPRITE_S + 12, SPRITE_S + 26);
      // Item
      drawItem(heldItem, hx, hy, 0.9);
      // White border
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.strokeRect(hx - 3, hy - 3, SPRITE_S + 6, SPRITE_S + 6);

      // "Carrying" label
      ctx.fillStyle = '#f1c40f';
      ctx.font = '8px "Press Start 2P", "Microsoft YaHei", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('手持: ' + heldItem.name, mouseX, hy - 12);
      ctx.textAlign = 'start';
    }

    // Tab bar (drawn on top)
    drawTabBar();

    // Divider line
    ctx.fillStyle = '#2c2c44';
    ctx.fillRect(0, UI_H, W, 2);

    // Title text
    ctx.fillStyle = '#f0e6d3';
    ctx.font = '14px "Press Start 2P", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('🏠 我属于哪里', 14, UI_H - 18);
    ctx.textAlign = 'start';

    // Progress indicator (bottom-left corner)
    const correct = correctCount();
    const total = items.length;
    const barX = 12, barY = H - 28, barW = 260, barH = 16;
    // Dark background with border
    ctx.fillStyle = '#111';
    ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 2;
    ctx.strokeRect(barX - 2, barY - 2, barW + 4, barH + 4);
    // Bar background
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(barX, barY, barW, barH);
    // Filled portion
    const pw = Math.floor((correct / total) * barW);
    if (pw > 0) {
      const grad = ctx.createLinearGradient(barX, barY, barX + barW, barY);
      grad.addColorStop(0, '#27ae60');
      grad.addColorStop(1, correct === total ? '#2ecc71' : '#f1c40f');
      ctx.fillStyle = grad;
      ctx.fillRect(barX, barY, pw, barH);
    }
    // Pixel segments
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    const segW = Math.floor(barW / total);
    for (let sx = barX + segW; sx < barX + barW; sx += segW) {
      ctx.fillRect(sx, barY, 2, barH);
    }
    // Count text (left of bar)
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px "Press Start 2P", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`已归位 ${correct} / ${total}`, barX, barY - 6);
    ctx.textAlign = 'start';

    // Music toggle (bottom-right)
    const musicX = W - 28, musicY = H - 28;
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(musicX - 2, musicY - 2, 24, 24);
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 2;
    ctx.strokeRect(musicX - 2, musicY - 2, 24, 24);
    ctx.fillStyle = musicOn ? '#f1c40f' : '#666';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(musicOn ? '♫' : '♪', musicX + 10, musicY + 16);
    ctx.textAlign = 'start';

    // Continue loop if needed
    const needLoop = heldItem || feedbacks.length > 0 || tabPulse > 0;
    if (needLoop) {
      tabPulse = (tabPulse + 1) % 80;
      requestAnimationFrame(render);
    }
  }

  // ─────────────────── INPUT ───────────────────
  function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    let cx, cy;
    if (e.changedTouches && e.changedTouches.length > 0) {
      cx = e.changedTouches[0].clientX; cy = e.changedTouches[0].clientY;
    } else if (e.touches && e.touches.length > 0) {
      cx = e.touches[0].clientX; cy = e.touches[0].clientY;
    } else {
      cx = e.clientX; cy = e.clientY;
    }
    return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
  }

  function findTabAt(cx, cy) {
    if (cy < 4 || cy > UI_H - 4) return null;
    const tabW = Math.floor((W - 20) / 6);
    const idx = Math.floor((cx - 10) / tabW);
    if (idx >= 0 && idx < 6 && cx >= 10 + idx * tabW && cx < 10 + (idx + 1) * tabW) {
      return ROOM_KEYS[idx];
    }
    return null;
  }

  function findItemInRoom(cx, cy) {
    for (let i = items.length - 1; i >= 0; i--) {
      const it = items[i];
      if (it.currentRoom !== currentRoom || it === heldItem) continue;
      if (cx >= it.x && cx <= it.x + SPRITE_S && cy >= it.y && cy <= it.y + SPRITE_S + 18) {
        return it;
      }
    }
    return null;
  }

  function isInRoom(cx, cy) {
    return cx >= ROOM_X && cx <= ROOM_X + ROOM_W && cy >= ROOM_Y && cy <= ROOM_Y + ROOM_H;
  }

  function onDown(e) {
    if (gameComplete) return;
    initAudio();
    startMusic(); // start bg music on first interaction
    e.preventDefault();
    const pos = getCanvasPos(e);
    mouseX = pos.x; mouseY = pos.y;

    // Check music toggle
    if (pos.x > W - 30 && pos.x < W - 6 && pos.y > H - 30 && pos.y < H - 6) {
      musicOn = !musicOn;
      if (musicOn) { musicNodes = null; startMusic(); } else { stopMusic(); }
      requestAnimationFrame(render);
      return;
    }

    // Check tab click first
    const tabKey = findTabAt(pos.x, pos.y);
    if (tabKey !== null) {
      if (heldItem) {
        // Switching rooms while carrying item
        currentRoom = tabKey;
        sfxPickup();
        requestAnimationFrame(render);
        return;
      }
      currentRoom = tabKey;
      hoveredItem = null;
      requestAnimationFrame(render);
      return;
    }

    // Not on tab — check if in room
    if (!isInRoom(pos.x, pos.y)) return;

    if (heldItem) {
      // Place held item at drop position
      heldItem.currentRoom = currentRoom;
      heldItem.x = pos.x - SPRITE_S / 2;
      heldItem.y = pos.y - SPRITE_S / 2 - 10;

      // Clamp to room bounds
      const minX = ROOM_X + WALL + 4;
      const minY = ROOM_Y + WALL + 4;
      const maxX = ROOM_X + ROOM_W - WALL - SPRITE_S - 4;
      const maxY = ROOM_Y + ROOM_H - WALL - SPRITE_S - 20;
      heldItem.x = Math.max(minX, Math.min(maxX, heldItem.x));
      heldItem.y = Math.max(minY, Math.min(maxY, heldItem.y));

      if (currentRoom === heldItem.home) {
        feedbacks.push({ room: currentRoom, color: '#2ecc71', timer: 25 });
        sfxCorrect();
      } else {
        feedbacks.push({ room: currentRoom, color: '#e74c3c', timer: 15 });
        sfxWrong();
      }
      heldItem = null;
      checkWin();
      requestAnimationFrame(render);
      return;
    }

    // Try to pick up an item
    const item = findItemInRoom(pos.x, pos.y);
    if (item) {
      heldItem = item;
      heldOrigRoom = item.currentRoom;
      heldOrigX = item.x;
      heldOrigY = item.y;
      sfxPickup();
      requestAnimationFrame(render);
    }
  }

  function onMove(e) {
    e.preventDefault();
    const pos = getCanvasPos(e);
    mouseX = pos.x; mouseY = pos.y;

    if (heldItem) {
      requestAnimationFrame(render);
    } else if (!gameComplete && isInRoom(pos.x, pos.y)) {
      const item = findItemInRoom(pos.x, pos.y);
      if (item !== hoveredItem) {
        hoveredItem = item;
        requestAnimationFrame(render);
      }
    }
  }

  function onUp(e) {
    // Not used for placement (we use click-to-place)
  }

  function onContextMenu(e) {
    // Right-click to cancel carry
    if (heldItem) {
      e.preventDefault();
      heldItem.x = heldOrigX;
      heldItem.y = heldOrigY;
      heldItem.currentRoom = heldOrigRoom;
      heldItem = null;
      requestAnimationFrame(render);
    }
  }

  function onKeyDown(e) {
    if (e.key === 'Escape' && heldItem) {
      heldItem.x = heldOrigX;
      heldItem.y = heldOrigY;
      heldItem.currentRoom = heldOrigRoom;
      heldItem = null;
      requestAnimationFrame(render);
    }
  }

  function checkWin() {
    const allCorrect = items.every(it => it.currentRoom === it.home);
    if (allCorrect) {
      gameComplete = true;
      sfxWin();
      setTimeout(showWinScreen, 500);
    }
  }

  // ─────────────────── WIN SCREEN ───────────────────
  const WIN_LINES = [
    '所有物品都回到了',
    '"该在"的位置。',
    '',
    '但它们并没有',
    '改变自己。',
    '',
    '你也是。',
    '不必扭曲自己去融入',
    '某个地方。',
    '',
    '吾心安处即是家。',
  ];

  const EASTER_LINES = [
    '其实，谁规定',
    '马桶上不能吃饭呢？',
    '',
    '这是你的家，',
    '你说了算。',
    '',
    '所谓的"归属"，',
    '不过是一道选择题。',
    '',
    '你不属于任何地方，',
    '所以你属于所有地方。',
  ];

  function showWinScreen() {
    overlay.classList.add('active');
    btnEaster.style.display = 'inline-block';
    btnReplay.style.display = 'inline-block';
    btnEaster.textContent = '...';
    easterTxt.classList.remove('show');
    easterTxt.innerHTML = '';
    qrcodeArea.classList.remove('show');
    easterRevealed = false;

    winMsg.innerHTML = '';
    winMsg.classList.add('show');
    winLinesShown = 0;

    function showNextLine() {
      if (winLinesShown < WIN_LINES.length) {
        const line = WIN_LINES[winLinesShown];
        const span = document.createElement('span');
        span.className = 'line';
        span.textContent = line || ' ';
        winMsg.appendChild(span);
        winLinesShown++;
        winAnimTimer = setTimeout(showNextLine, line ? 500 : 300);
      }
    }
    winAnimTimer = setTimeout(showNextLine, 400);
  }

  btnEaster.addEventListener('click', () => {
    if (!gameComplete) return;
    if (!easterRevealed) {
      easterTxt.innerHTML = EASTER_LINES.map(l => `<span class="line">${l || '&nbsp;'}</span>`).join('');
      easterTxt.classList.add('show');
      qrcodeArea.classList.add('show');
      btnEaster.textContent = '打乱一切';
      easterRevealed = true;
    } else {
      // Reshuffle all items randomly
      const allRooms = ROOM_KEYS;
      items.forEach(it => {
        it.currentRoom = allRooms[Math.floor(Math.random() * allRooms.length)];
      });
      ROOM_KEYS.forEach(rk => positionItemsInRoom(rk));
      gameComplete = false;
      easterRevealed = false;
      winLinesShown = 0;
      feedbacks = [];
      heldItem = null;
      hoveredItem = null;
      currentRoom = 'kitchen';
      overlay.classList.remove('active');
      winMsg.classList.remove('show');
      winMsg.innerHTML = '';
      easterTxt.classList.remove('show');
      easterTxt.innerHTML = '';
      qrcodeArea.classList.remove('show');
      btnEaster.textContent = '...';
      if (winAnimTimer) { clearTimeout(winAnimTimer); winAnimTimer = null; }
      requestAnimationFrame(render);
      sfxPickup();
    }
  });

  btnReplay.addEventListener('click', () => {
    initGame();
    requestAnimationFrame(render);
  });

  // ─────────────────── EVENT LISTENERS ───────────────────
  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup', onUp);
  canvas.addEventListener('contextmenu', onContextMenu);
  canvas.addEventListener('touchstart', onDown, { passive: false });
  canvas.addEventListener('touchmove', onMove, { passive: false });
  canvas.addEventListener('touchend', onUp);
  window.addEventListener('keydown', onKeyDown);

  // ────── 收款码：把 qrcode.jpg 放到和这个 HTML 同目录，或替换下面这行为 base64 ──────
  qrcodeImg.src = 'qrcode.jpg';

  // ─────────────────── INIT ───────────────────
  initGame();
  requestAnimationFrame(render);
  console.log('🏠 归属 - Belonging');
  console.log('点击物品拾起 → 点击顶部标签切换房间 → 点击地板放下');
  console.log('右键或按 Esc 取消手持');
})();
</script>
</body>
</html>
